<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>六角形 直径計算</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>六角形 直径計算</h1>

    <div class="input-area">
      <label for="side">対辺の長さを入力</label>
      <input type="number" id="side" placeholder="例：10" />
      <span class="unit">mm</span>
    </div>

    <button id="calcBtn">計算する</button>

    <div class="result-area" id="resultArea">
      <div class="result-item">
        <span class="result-label">外接円の直径</span>
        <span class="result-value" id="outer">-</span>
      </div>
      <div class="result-item">
        <span class="result-label">内接円の直径</span>
        <span class="result-value" id="inner">-</span>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
